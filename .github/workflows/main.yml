name: Admin Runner (External Trigger)

on:
  workflow_dispatch:

concurrency:
  group: admin-runner
  cancel-in-progress: false

jobs:
  admin:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NetBird
        run: |
          choco install netbird -y
          if ($LASTEXITCODE -ne 0) {
            $installerUrl = "https://github.com/netbirdio/netbird/releases/latest/download/netbird_installer.exe"
            Invoke-WebRequest -Uri $installerUrl -OutFile "$env:TEMP\netbird_installer.exe"
            Start-Process -FilePath "$env:TEMP\netbird_installer.exe" -ArgumentList "/S" -Wait
          }

      - name: Connect to NetBird (SSH + RDP, disable JWT auth)
        run: |
          $netbird = "${env:ProgramFiles}\NetBird\netbird.exe"
          & $netbird down 2>$null
          & $netbird up --setup-key C2E7F429-1F54-4FDC-AF61-FC67A5C59500 `
            --allow-server-ssh --enable-ssh-root --disable-ssh-auth `
            --hostname admin-node

      - name: Wait for IP and enable RDP
        id: ip
        run: |
          $netbird = "${env:ProgramFiles}\NetBird\netbird.exe"
          for ($i=0; $i -lt 30; $i++) {
            $status = & $netbird status | Out-String
            if ($status -match "NetBird IP: (\d+\.\d+\.\d+\.\d+)") {
              $ip = $matches[1]
              echo "netbird_ip=$ip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              break
            }
            Start-Sleep -Seconds 2
          }

          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $username = "netbird"
          $password = "Runner12345!"
          net user $username /delete 2>$null
          net user $username $password /add
          net localgroup "Remote Desktop Users" $username /add
          net localgroup "Administrators" $username /add

      - name: Allow inbound port 5000 (Flask dashboard)
        run: |
          New-NetFirewallRule -DisplayName "Allow Flask Dashboard" `
            -Direction Inbound -Protocol TCP -LocalPort 5000 -Action Allow -Profile Any

      - name: Install Python dependencies and start web dashboard
        run: |
          python -m pip install --upgrade pip
          pip install flask
          mkdir C:\webapp_data -Force
          $env:WEBAPP_DATA = "C:\webapp_data"
          # Start the Flask app in the background
          Start-Process -NoNewWindow -FilePath python -ArgumentList "dashboard\app.py"

      - name: Display connection info
        run: |
          Write-Host "========================================="
          Write-Host "🔥 ADMIN RUNNER READY"
          Write-Host "NetBird IP: ${{ steps.ip.outputs.netbird_ip }}"
          Write-Host "RDP: ${{ steps.ip.outputs.netbird_ip }}:3389 (netbird / Runner12345!)"
          Write-Host "SSH: netbird ssh netbird@${{ steps.ip.outputs.netbird_ip }}"
          Write-Host "Dashboard: http://${{ steps.ip.outputs.netbird_ip }}:5000"
          Write-Host "========================================="

      - name: Keep alive with health check and task queue
        run: |
          $netbird = "${env:ProgramFiles}\NetBird\netbird.exe"
          $setupKey = "C2E7F429-1F54-4FDC-AF61-FC67A5C59500"
          $flags = "--allow-server-ssh --enable-ssh-root --disable-ssh-auth --hostname admin-node"

          for ($i = 0; $i -lt 21600; $i += 300) {
            Start-Sleep -Seconds 300
            $status = & $netbird status 2>&1
            $now = Get-Date -Format "HH:mm:ss"
            Write-Host "$now - NetBird status:"
            Write-Host $status

            if ($status -match "Disconnected") {
              Write-Host "$now - NetBird disconnected! Reconnecting..."
              & $netbird down 2>$null
              Start-Sleep -Seconds 5
              & $netbird up --setup-key $setupKey $flags
              Write-Host "$now - Reconnection attempt completed."
            } else {
              Write-Host "$now - NetBird is healthy."
            }
          }
