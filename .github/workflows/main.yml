name: Admin Runner (External Trigger)

on:
  workflow_dispatch:

concurrency:
  group: admin-runner
  cancel-in-progress: false

jobs:
  admin:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NetBird
        run: |
          choco install netbird -y
          if ($LASTEXITCODE -ne 0) {
            $installerUrl = "https://github.com/netbirdio/netbird/releases/latest/download/netbird_installer.exe"
            Invoke-WebRequest -Uri $installerUrl -OutFile "$env:TEMP\netbird_installer.exe"
            Start-Process -FilePath "$env:TEMP\netbird_installer.exe" -ArgumentList "/S" -Wait
          }

      - name: Connect to NetBird (SSH + RDP, disable JWT auth)
        run: |
          $netbird = "${env:ProgramFiles}\NetBird\netbird.exe"
          & $netbird down 2>$null
          & $netbird up --setup-key C2E7F429-1F54-4FDC-AF61-FC67A5C59500 `
            --allow-server-ssh --enable-ssh-root --disable-ssh-auth `
            --hostname admin-node

      - name: Wait for IP and enable RDP
        id: ip
        run: |
          $netbird = "${env:ProgramFiles}\NetBird\netbird.exe"
          for ($i=0; $i -lt 30; $i++) {
            $status = & $netbird status | Out-String
            if ($status -match "NetBird IP: (\d+\.\d+\.\d+\.\d+)") {
              $ip = $matches[1]
              echo "netbird_ip=$ip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              break
            }
            Start-Sleep -Seconds 2
          }

          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $username = "netbird"
          $password = "Runner12345!"
          net user $username /delete 2>$null
          net user $username $password /add
          net localgroup "Remote Desktop Users" $username /add
          net localgroup "Administrators" $username /add

      - name: Disable Windows Firewall and configure NetBird interface
        run: |
          Set-NetFirewallProfile -All -Enabled False
          Write-Host "Firewall disabled."

          # Set NetBird interface to Private
          $adapter = Get-NetAdapter | Where-Object { $_.Name -eq "wt0" }
          if ($adapter) {
            Set-NetConnectionProfile -InterfaceAlias $adapter.Name -NetworkCategory Private
            Write-Host "NetBird interface set to Private."
          } else {
            Write-Host "wt0 not found."
          }
          # Add firewall rule (belt and suspenders)
          netsh advfirewall firewall add rule name="Open Port 5000" dir=in action=allow protocol=TCP localport=5000
          Write-Host "Firewall rule added."

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask waitress
          mkdir C:\webapp_data -Force
          $env:WEBAPP_DATA = "C:\webapp_data"

      - name: Display connection info
        run: |
          Write-Host "========================================="
          Write-Host "🔥 ADMIN RUNNER READY"
          Write-Host "NetBird IP: ${{ steps.ip.outputs.netbird_ip }}"
          Write-Host "RDP: ${{ steps.ip.outputs.netbird_ip }}:3389 (netbird / Runner12345!)"
          Write-Host "SSH: netbird ssh netbird@${{ steps.ip.outputs.netbird_ip }}"
          Write-Host "Dashboard: http://${{ steps.ip.outputs.netbird_ip }}:5000"
          Write-Host "========================================="

      - name: Keep alive with health check and server start
        run: |
          $netbird = "${env:ProgramFiles}\NetBird\netbird.exe"
          $setupKey = "C2E7F429-1F54-4FDC-AF61-FC67A5C59500"
          $flags = "--allow-server-ssh --enable-ssh-root --disable-ssh-auth --hostname admin-node"
          $adminIp = "${{ steps.ip.outputs.netbird_ip }}"
          $serverStarted = $false

          for ($i = 0; $i -lt 21600; $i += 300) {
            # Start the dashboard server once (only on first iteration)
            if (-not $serverStarted) {
              Write-Host "Starting Waitress server on $adminIp`:5000 ..."
              cd $env:GITHUB_WORKSPACE
              $process = Start-Process -NoNewWindow -FilePath python -ArgumentList "-m waitress --host=$adminIp --port=5000 dashboard.app:app" -PassThru
              Write-Host "Server started with PID $($process.Id)"
              $serverStarted = $true
              # Give it a moment to bind
              Start-Sleep -Seconds 10
              # Test connection locally
              try {
                $resp = Invoke-RestMethod -Uri "http://$adminIp`:5000" -TimeoutSec 5
                Write-Host "Dashboard is reachable via NetBird IP."
              } catch {
                Write-Host "Dashboard test via NetBird IP failed: $_"
              }
            }

            # Health check: ensure NetBird is still connected
            $status = & $netbird status 2>&1
            $now = Get-Date -Format "HH:mm:ss"
            Write-Host "$now - NetBird status:"
            Write-Host $status

            if ($status -match "Disconnected") {
              Write-Host "$now - NetBird disconnected! Reconnecting..."
              & $netbird down 2>$null
              Start-Sleep -Seconds 5
              & $netbird up --setup-key $setupKey $flags
              Write-Host "$now - Reconnection attempt completed."
            } else {
              Write-Host "$now - NetBird is healthy."
            }

            Start-Sleep -Seconds 300
          }
