name: NetBird SSH (No Mining)
on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install NetBird
        run: curl -fsSL https://pkgs.netbird.io/install.sh | sh

      - name: Connect to NetBird with root SSH enabled
        run: sudo netbird up --setup-key C2E7F429-1F54-4FDC-AF61-FC67A5C59500 --allow-server-ssh --enable-ssh-root
        # --enable-ssh-root allows direct root login via NetBird's SSH

      - name: Get NetBird IP
        id: ip
        run: |
          NB_IP=$(sudo netbird status | grep -oP 'NetBird IP: \K[^\s]+')
          echo "netbird_ip=$NB_IP" >> $GITHUB_OUTPUT
          echo "Runner NetBird IP: $NB_IP"

      - name: Display connection info
        run: |
          echo "========================================="
          echo "✅ Runner is connected to NetBird!"
          echo "NetBird IP: ${{ steps.ip.outputs.netbird_ip }}"
          echo ""
          echo "🖥️ NetBird SSH (root access enabled):"
          echo "   Method 1: Go to NetBird dashboard → click SSH button → enter 'root'"
          echo "   Method 2: netbird ssh root@${{ steps.ip.outputs.netbird_ip }}"
          echo "   Method 3: ssh root@${{ steps.ip.outputs.netbird_ip }}"
          echo "========================================="

      - name: Keep runner alive
        run: sleep 6h
