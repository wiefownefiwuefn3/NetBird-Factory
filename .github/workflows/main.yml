name: Admin Runner (with Discord Bot)

on:
  workflow_dispatch:

concurrency:
  group: admin-runner
  cancel-in-progress: false

jobs:
  admin:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NetBird
        run: |
          choco install netbird -y
          if ($LASTEXITCODE -ne 0) {
            $installerUrl = "https://github.com/netbirdio/netbird/releases/latest/download/netbird_installer.exe"
            Invoke-WebRequest -Uri $installerUrl -OutFile "$env:TEMP\netbird_installer.exe"
            Start-Process -FilePath "$env:TEMP\netbird_installer.exe" -ArgumentList "/S" -Wait
          }

      - name: Connect to NetBird (SSH + RDP, disable JWT auth)
        run: |
          $netbird = "${env:ProgramFiles}\NetBird\netbird.exe"
          & $netbird down 2>$null
          & $netbird up --setup-key C2E7F429-1F54-4FDC-AF61-FC67A5C59500 `
            --allow-server-ssh --enable-ssh-root --disable-ssh-auth `
            --hostname admin-node

      - name: Wait for IP and enable RDP
        id: ip
        run: |
          $netbird = "${env:ProgramFiles}\NetBird\netbird.exe"
          for ($i=0; $i -lt 30; $i++) {
            $status = & $netbird status | Out-String
            if ($status -match "NetBird IP: (\d+\.\d+\.\d+\.\d+)") {
              $ip = $matches[1]
              echo "netbird_ip=$ip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              break
            }
            Start-Sleep -Seconds 2
          }

          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          $username = "netbird"
          $password = "Runner12345!"
          net user $username /delete 2>$null
          net user $username $password /add
          net localgroup "Remote Desktop Users" $username /add
          net localgroup "Administrators" $username /add

      - name: Disable Windows Firewall and configure NetBird interface
        run: |
          Set-NetFirewallProfile -All -Enabled False
          Write-Host "Firewall disabled."

          # Set NetBird interface to Private
          $adapter = Get-NetAdapter | Where-Object { $_.Name -eq "wt0" }
          if ($adapter) {
            Set-NetConnectionProfile -InterfaceAlias $adapter.Name -NetworkCategory Private
            Write-Host "NetBird interface set to Private."
          }

          # General firewall rule for port 5000
          netsh advfirewall firewall add rule name="Open Port 5000" dir=in action=allow protocol=TCP localport=5000
          Write-Host "General firewall rule added."

          # Explicit rule for NetBird subnet (100.64.0.0/10)
          netsh advfirewall firewall add rule name="Allow NetBird Subnet" dir=in action=allow protocol=TCP localport=5000 remoteip=100.64.0.0/10
          Write-Host "NetBird subnet rule added."

          # Restart NetBird to apply network category change
          Restart-Service NetBird
          Write-Host "NetBird service restarted."

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask waitress discord.py aiohttp
          mkdir C:\webapp_data -Force
          $env:WEBAPP_DATA = "C:\webapp_data"

      - name: Start Flask dashboard
        run: |
          cd $env:GITHUB_WORKSPACE
          Write-Host "Starting Waitress on 0.0.0.0:5000"
          $process = Start-Process -NoNewWindow -FilePath python -ArgumentList "-m waitress --host=0.0.0.0 --port=5000 dashboard.app:app" -PassThru
          Write-Host "Waitress started with PID $($process.Id)"
          Start-Sleep -Seconds 10
          netstat -an | findstr :5000
          try {
            $resp = Invoke-RestMethod -Uri "http://localhost:5000" -TimeoutSec 5
            Write-Host "Dashboard reachable locally."
          } catch {
            Write-Host "Dashboard local test failed: $_"
          }

      - name: Start Discord bot
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: |
          cd $env:GITHUB_WORKSPACE
          Write-Host "Starting Discord bot..."
          $botProcess = Start-Process -NoNewWindow -FilePath python -ArgumentList "dashboard/discord_bot.py" -PassThru `
            -RedirectStandardOutput "C:\discord_bot.log" -RedirectStandardError "C:\discord_bot_error.log"
          Write-Host "Bot started with PID $($botProcess.Id)"
          Start-Sleep -Seconds 15
          Write-Host "=== Bot stdout ==="
          Get-Content C:\discord_bot.log -ErrorAction SilentlyContinue
          Write-Host "=== Bot stderr ==="
          Get-Content C:\discord_bot_error.log -ErrorAction SilentlyContinue

      - name: Display connection info
        run: |
          Write-Host "========================================="
          Write-Host "🔥 ADMIN RUNNER READY"
          Write-Host "NetBird IP: ${{ steps.ip.outputs.netbird_ip }}"
          Write-Host "RDP: ${{ steps.ip.outputs.netbird_ip }}:3389 (netbird / Runner12345!)"
          Write-Host "SSH: netbird ssh netbird@${{ steps.ip.outputs.netbird_ip }}"
          Write-Host "Dashboard: http://${{ steps.ip.outputs.netbird_ip }}:5000"
          Write-Host "Discord bot: online (check your server)"
          Write-Host "========================================="

      - name: Keep alive with health check
        run: |
          $netbird = "${env:ProgramFiles}\NetBird\netbird.exe"
          $setupKey = "C2E7F429-1F54-4FDC-AF61-FC67A5C59500"
          $flags = "--allow-server-ssh --enable-ssh-root --disable-ssh-auth --hostname admin-node"

          for ($i = 0; $i -lt 21600; $i += 300) {
            Start-Sleep -Seconds 300
            $status = & $netbird status 2>&1
            $now = Get-Date -Format "HH:mm:ss"
            Write-Host "$now - NetBird status:"
            Write-Host $status

            if ($status -match "Disconnected") {
              Write-Host "$now - NetBird disconnected! Reconnecting..."
              & $netbird down 2>$null
              Start-Sleep -Seconds 5
              & $netbird up --setup-key $setupKey $flags
              Write-Host "$now - Reconnection attempt completed."
            } else {
              Write-Host "$now - NetBird is healthy."
            }

            # Optional: restart bot if dead (simplified – you can extend)
          }
