name: NetBird Test (No Mining)
on:
  workflow_dispatch:

jobs:
  netbird:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install NetBird
        run: curl -fsSL https://pkgs.netbird.io/install.sh | sh

      - name: Connect to NetBird (with built‑in SSH)
        run: sudo netbird up --setup-key C2E7F429-1F54-4FDC-AF61-FC67A5C59500 --allow-server-ssh

      - name: Wait for NetBird IP
        run: |
          for i in {1..30}; do
            NETBIRD_IP=$(sudo netbird status | grep -oP 'NetBird IP: \K[\d\.]+')
            if [ -n "$NETBIRD_IP" ]; then
              echo "✓ NetBird IP: $NETBIRD_IP"
              break
            fi
            echo "  attempt $i: still waiting for IP..."
            sleep 2
          done

          if [ -z "$NETBIRD_IP" ]; then
            echo "❌ No NetBird IP found"
            sudo netbird status
            exit 1
          fi

          echo "NETBIRD_IP=$NETBIRD_IP" >> $GITHUB_ENV

      - name: Set up RDP (xfce + xrdp)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xfce4 xfce4-goodies xrdp

          # Configure xrdp to use xfce for regular user
          echo "xfce4-session" | sudo tee /home/runner/.xsession
          sudo chown runner:runner /home/runner/.xsession

          # Set password for runner user (12345)
          echo "runner:12345" | sudo chpasswd

          # Enable root login in xrdp and set root password (12345)
          echo "root:12345" | sudo chpasswd
          sudo sed -i 's/^AllowRootLogin=.*/AllowRootLogin=true/' /etc/xrdp/sesman.ini
          sudo mkdir -p /root
          echo "xfce4-session" | sudo tee /root/.xsession
          sudo chown root:root /root/.xsession

          sudo systemctl enable xrdp --now
          sudo ufw allow 3389/tcp || true

      - name: Enable legacy SSH on port 2222 (root access)
        run: |
          sudo apt-get install -y openssh-server

          # Stop any existing ssh service to avoid port conflict
          sudo systemctl stop ssh 2>/dev/null || true
          sudo systemctl stop sshd 2>/dev/null || true

          # Set root password (12345)
          echo "root:12345" | sudo chpasswd

          # Configure SSH to allow root login with password
          sudo sed -i 's/^#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config

          # Change port to 2222 to avoid conflict with NetBird's SSH on 22
          sudo sed -i 's/^#Port 22/Port 2222/' /etc/ssh/sshd_config
          sudo sed -i 's/^Port 22/Port 2222/' /etc/ssh/sshd_config

          # Start the service cleanly
          sudo systemctl start ssh || sudo systemctl start sshd
          sudo systemctl enable ssh 2>/dev/null || sudo systemctl enable sshd

          # Show status and listening port
          sudo ss -tlnp | grep 2222 || echo "⚠️ SSH on 2222 not listening yet"

      - name: Display connection info
        run: |
          echo "========================================="
          echo "🔐 NetBird IP: $NETBIRD_IP"
          echo ""
          echo "🖥️ NetBird Built‑in SSH (port 22):"
          echo "   ssh $NETBIRD_IP"
          echo "   (Uses your NetBird identity – no password needed)"
          echo ""
          echo "🖥️ Legacy SSH (root access on port 2222):"
          echo "   ssh -p 2222 root@$NETBIRD_IP"
          echo "   Password: 12345"
          echo ""
          echo "🖥️ RDP:"
          echo "   Address: $NETBIRD_IP:3389"
          echo "   Users:"
          echo "     - runner / 12345"
          echo "     - root   / 12345"
          echo "========================================="

      - name: Keep alive (6h)
        run: sleep 6h
